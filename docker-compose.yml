version: '3.8'

services:
  # Servidor Backend
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pokemon-quiz-server
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      CLIENT_URL: http://pokemontrivial.duckdns.org
      ROUNDS_PER_GAME: 8
    ports:
      - "3001:3001"
    networks:
      - pokemon-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ./server/data:/app/data:ro
      - ./server/public:/app/public:ro

  # Cliente Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pokemon-quiz-client
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - pokemon-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ./letsencrypt:/etc/nginx/certs:ro

networks:
  pokemon-network:
    driver: bridge
